{% extends 'shop/base.html' %}

{% block content %}

<h1>{{ product.name }}</h1>

<p><b>Цена:</b> {{ product.price }} </p>
<p><b>В наличии:</b> {{ product.stock }}</p>
<p><b>Описание:</b> {{ product.description }}</p>

<a href="/cart/add/{{ product.id }}/">Добавить в корзину</a>
<br>
<a href="/catalog/">Назад</a>

{% endblock %}
